{% extends 'base.html' %}

{% block title %}Booking Confirmed - StayEase{% endblock %}

{% block content %}

    <section class="success-section">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h1>Booking Confirmed!</h1>
            <p>Thank you, <strong>{{ guest_name }}</strong>. Your booking for the <strong>{{ room }}</strong> has been confirmed.</p>
            <p>A confirmation email has been sent to <strong>{{ guest_email }}</strong>.</p>
            <a href="{% url 'home' %}" class="btn">Back to Home</a>
        </div>
    </section>

{% endblock %}
